[workspace]
members = [
  "crates/basic_types",
  "crates/constants",
  "crates/contracts",
  "crates/crypto_primitives",
  "crates/merkle_tree",
  "crates/mini_merkle_tree",
  "crates/multivm",
  "crates/prover_interface",
  "crates/tee_prover_interface",
  "crates/tee_verifier",
  "crates/types",
  "crates/vm_interface",
]
resolver = "2"

[workspace.package]
version = "29.7.1-non-semver-compat"
edition = "2021"
authors = ["The Matter Labs Team <hello@matterlabs.dev>"]
homepage = "https://zksync.io/"
repository = "https://github.com/matter-labs/zksync-era"
license = "MIT OR Apache-2.0"
keywords = ["blockchain", "zksync"]
categories = ["cryptography"]

[workspace.dependencies]
# External dependencies
anyhow = "1"
assert_matches = "1.5"
async-trait = "0.1"
bincode = "1"
blake2 = "0.10"
ciborium = "0.2"
chrono = { version = "0.4", default-features = false }
clap = "4.2.2"
const-decoder = "0.4.0"
criterion = "0.4.0"
derive_more = "2.0.1"
ethabi = { version = "18.0.0", default-features = false, features = ["std", "rlp", "serde"] }
hex = "0.4"
insta = "1.29.0"
itertools = "0.13.0"
leb128 = "0.2.5"
num_enum = "0.7.2"
once_cell = "1"
pretty_assertions = "1"
prost = "0.12.6"
rand = "0.8"
rayon = "1.3.1"
rlp = "0.5"
secp256k1 = { version = "0.27.0", features = ["recovery", "global-context"] }
serde = "1"
serde_json = "1"
serde_urlencoded = "0.7"
serde_with = "1"
sha2 = "0.10.8"
strum = "0.26"
tempfile = "3.0.2"
test-casing = "0.1.2"
thiserror = "2.0.12"
thread_local = "1.1"
tiny-keccak = "2"
tokio = "1"
tracing = "0.1"
tracing-subscriber = "0.3"

# Protocol and VM dependencies
circuit_sequencer_api = { path = "../vm_setup/zksync-protocol/crates/circuit_sequencer_api" }
zk_evm_1_5_2 = { package = "zk_evm", path = "../vm_setup/zksync-protocol/crates/zk_evm" }
zksync_vm2 = { path = "../vm_setup/vm2/crates/vm2" }

# Optional dependency keys required by inherited manifests
zksync_protobuf = "=0.13"
zksync_protobuf_build = "=0.13"

# Local dependencies in this workspace
zksync_basic_types = { version = "29.7.1-non-semver-compat", path = "crates/basic_types" }
zksync_contracts = { version = "29.7.1-non-semver-compat", path = "crates/contracts" }
zksync_crypto_primitives = { version = "29.7.1-non-semver-compat", path = "crates/crypto_primitives" }
zksync_merkle_tree = { version = "29.7.1-non-semver-compat", path = "crates/merkle_tree", default-features = false }
zksync_mini_merkle_tree = { version = "29.7.1-non-semver-compat", path = "crates/mini_merkle_tree" }
zksync_multivm = { version = "29.7.1-non-semver-compat", path = "crates/multivm" }
zksync_prover_interface = { version = "29.7.1-non-semver-compat", path = "crates/prover_interface" }
zksync_system_constants = { version = "29.7.1-non-semver-compat", path = "crates/constants" }
zksync_tee_prover_interface = { version = "29.7.1-non-semver-compat", path = "crates/tee_prover_interface" }
zksync_tee_verifier = { version = "29.7.1-non-semver-compat", path = "crates/tee_verifier" }
zksync_types = { version = "29.7.1-non-semver-compat", path = "crates/types" }
zksync_vm_interface = { version = "29.7.1-non-semver-compat", path = "crates/vm_interface" }
