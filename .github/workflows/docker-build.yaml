name: docker-build

on:
  pull_request:
    paths:
      - Dockerfile
      - 'server/**'
      - 'guest/**'
      - 'crates/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/docker-build.yaml'
  push:
    # No `paths:` filter here — tag pushes must always trigger a release build,
    # and main pushes are infrequent enough that always building is fine.
    branches: [main, feat/server-vks-from-disk]
    tags: ['v*']

permissions:
  contents: read
  packages: write

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: build
    runs-on: matterlabs-ci-runner-high-performance
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      # The guest must be built reproducibly BEFORE the image build: the prod
      # Dockerfile no longer builds it (a nested `docker run --reproducible`
      # isn't possible during `docker build`), and instead COPYs the dist from
      # the build context. Build it here on the runner so guest/dist/app is in
      # the context handed to buildx below.
      - name: Checkout airbender-platform
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          repository: matter-labs/airbender-platform
          ref: b7403c7200e6ad37efa34e66d3fec6fb43c976f2 # v0.2.1
          path: airbender-platform

      - name: Install Rust toolchain
        uses: moonrepo/setup-rust@ede6de059f8046a5e236c94046823e2af11ca670 # v1.2.2
        with:
          inherit-toolchain: true

      - name: Install cargo-airbender
        working-directory: ./airbender-platform
        run: cargo install --path crates/cargo-airbender --locked --no-default-features --force

      - name: Build guest (reproducible)
        run: |
          docker info >/dev/null
          cargo airbender build --reproducible --workspace-root . --project guest

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2 # v3.10.0

      - name: Log in to GitHub Container Registry
        if: github.event_name == 'push'
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to GCP Artifact Registry
        if: github.event_name == 'push'
        shell: bash
        run: gcloud auth configure-docker us-docker.pkg.dev -q

      # Tag format mirrors matter-labs/zksync-era's build templates:
      # <short-sha>-<unix-timestamp>. The timestamp keeps tags unique across
      # rebuilds of the same commit (e.g. a force-push that doesn't change HEAD).
      - name: Compute image tag
        id: tag
        run: echo "image_tag=$(git rev-parse --short HEAD)-$(date +%s)" >> "$GITHUB_OUTPUT"

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@902fa8ec7d6ecbf8d84d538b9b233a880e428804 # v5.7.0
        with:
          images: |
            ghcr.io/${{ github.repository }}
            us-docker.pkg.dev/matterlabs-infra/matterlabs-docker/${{ github.event.repository.name }}
          tags: |
            type=raw,value=${{ steps.tag.outputs.image_tag }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v') }}

      - name: Build and push
        uses: docker/build-push-action@14487ce63c7a62a4a324b0bfb37086795e31c6c1 # v6.16.0
        with:
          context: .
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
