name: vast-base-image

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag suffix"
        required: false
        default: ""
  push:
    branches:
      - main
      - dl/vast-and-split-snark
    paths:
      - Dockerfile.vast-base
      - scripts/vast/**
      - .github/workflows/vast-base-image.yaml

permissions:
  contents: read
  packages: write

concurrency:
  group: vast-base-image-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2 # v3.10.0

      - name: Log in to GHCR
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve image metadata
        id: image
        env:
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          image="ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/eravm-airbender-verifier-vast"
          short_sha="${GITHUB_SHA::12}"
          if [ -n "$INPUT_TAG" ]; then
            tag="$INPUT_TAG"
          else
            tag="pr17-${short_sha}"
          fi
          echo "image=$image" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "ref=$image:$tag" >> "$GITHUB_OUTPUT"

      - name: Build and push Vast base image
        id: build
        uses: docker/build-push-action@14487ce63c7a62a4a324b0bfb37086795e31c6c1 # v6.16.0
        with:
          context: .
          file: Dockerfile.vast-base
          platforms: linux/amd64
          push: true
          tags: ${{ steps.image.outputs.ref }}
          build-args: |
            PREBUILD_BELLMAN_CUDA=0
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Print image reference
        run: |
          echo "Image: ${{ steps.image.outputs.ref }}"
          echo "Digest: ${{ steps.build.outputs.digest }}"
          echo "Digest-pinned reference:"
          echo "${{ steps.image.outputs.image }}@${{ steps.build.outputs.digest }}"
