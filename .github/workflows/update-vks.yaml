name: update-vks

# VK regeneration pipeline. Dispatched by `update-vks-dispatch.yaml`.
# Builds the PR's guest, regenerates the VKs inside the trusted Docker
# image, and commits the result to the PR branch.

on:
  workflow_dispatch:
    inputs:
      pr_number:
        type: string
        required: true
      head_repo:
        type: string
        required: true
      head_ref:
        type: string
        required: true
      head_sha:
        type: string
        required: true
      comment_id:
        type: string
        required: true

permissions:
  contents: read

concurrency:
  group: update-vks-${{ inputs.pr_number }}
  cancel-in-progress: false

jobs:
  # Build the host CLI and guest from the PR head. Done inside this
  # workflow so /update-vks doesn't have to wait for the PR's ci-run to
  # finish — and so a ci-run that ends in failure (e.g. because vk-check
  # fails on stale VKs) doesn't block us from finding artifacts. Mirrors
  # `server-integration-build` in ci-check.yaml; permissions stay
  # read-only because no PR code should ever see the push token.
  build:
    name: build
    permissions:
      contents: read
    runs-on: matterlabs-ci-runner-high-performance
    timeout-minutes: 90
    container:
      image: nvidia/cuda:13.0.3-devel-ubuntu22.04
    env:
      CUDA_ARCH: "89"
      CUDAARCHS: "89"
    steps:
      - name: Install git
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          apt-get update
          apt-get install -y git

      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          repository: ${{ inputs.head_repo }}
          ref: ${{ inputs.head_sha }}
          persist-credentials: false

      - name: Checkout airbender-platform
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          repository: matter-labs/airbender-platform
          ref: 6a81afcf992f586256b943ba3241254202de8901
          path: airbender-platform
          persist-credentials: false

      - name: Setup runner
        uses: matter-labs/zksync-os-server/.github/actions/runner-setup@24d38529dbeb2f0bdd016005b1e5e0bc491b692f

      - name: Install extra apt packages
        env:
          DEBIAN_FRONTEND: noninteractive
        run: apt-get install -y clang build-essential curl libclang-dev

      - name: Build era-bellman-cuda
        run: |
          git clone --depth=1 https://github.com/matter-labs/era-bellman-cuda.git
          cmake -B era-bellman-cuda/build -S era-bellman-cuda -DCMAKE_BUILD_TYPE=Release
          cmake --build era-bellman-cuda/build -j"$(nproc)"
          echo "BELLMAN_CUDA_DIR=$(pwd)/era-bellman-cuda" >> "${GITHUB_ENV}"

      - name: Install cargo-binutils
        working-directory: ./airbender-platform
        run: cargo install cargo-binutils --locked --force

      - name: Install cargo-airbender
        working-directory: ./airbender-platform
        run: cargo install --path crates/cargo-airbender --locked --no-default-features --force

      - name: Build guest
        working-directory: ./guest
        run: cargo airbender build

      - name: Build eravm-prover-host (snark_gpu)
        env:
          RUST_BACKTRACE: 1
        run: cargo build --release -p eravm-prover-host --locked --features snark_gpu

      - name: Stage runtime CUDA libraries
        run: |
          mkdir -p bellman-cuda-stage
          find era-bellman-cuda/build -type f \( -name '*.so*' -o -name '*.a' \) -exec cp -v {} bellman-cuda-stage/ \;
          cp -v /usr/local/cuda/lib64/libcudart.so* bellman-cuda-stage/

      - name: Upload prover-host binary
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f3 # v6.0.0
        with:
          name: update-vks-prover-host-bin
          path: target/release/eravm-prover-host
          if-no-files-found: error
          retention-days: 1

      - name: Upload guest dist
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f3 # v6.0.0
        with:
          name: update-vks-guest-dist
          path: guest/dist/app
          if-no-files-found: error
          retention-days: 1

      - name: Upload bellman-cuda libraries
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f3 # v6.0.0
        with:
          name: update-vks-bellman-cuda
          path: bellman-cuda-stage
          if-no-files-found: error
          retention-days: 1

  regen:
    name: regen
    needs: build
    permissions:
      contents: read
    runs-on: matterlabs-ci-hetzner-rtx6000-gpu
    timeout-minutes: 60
    env:
      LD_LIBRARY_PATH: ${{ github.workspace }}/stage/cuda-libs
    steps:
      - name: Download prover-host binary
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          name: update-vks-prover-host-bin
          path: stage/bin

      - name: Download guest dist
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          name: update-vks-guest-dist
          path: stage/guest

      - name: Download bellman-cuda libraries
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          name: update-vks-bellman-cuda
          path: stage/cuda-libs

      - name: Make host binary executable
        run: chmod +x stage/bin/eravm-prover-host

      - name: Download SNARK trusted setup
        run: |
          mkdir -p stage/setup
          ./stage/bin/eravm-prover-host download-trusted-setup \
              --output stage/setup/setup.key

      - name: Regenerate VKs
        env:
          ERAVM_PROVER_HOST_GUEST_DIR: ${{ github.workspace }}/stage/guest
          RUST_BACKTRACE: 1
          RUST_MIN_STACK: "134217728"
        run: |
          ulimit -s unlimited
          mkdir -p vks-output
          ./stage/bin/eravm-prover-host gen-vks \
              --output-dir vks-output \
              --trusted-setup stage/setup/setup.key
          ls -lh vks-output

      - name: Upload regenerated VKs
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f3 # v6.0.0
        with:
          name: update-vks-vks
          path: vks-output
          if-no-files-found: error
          retention-days: 1

  # The only job with a write-scoped token. Commits via the Git Data API
  # so no PR file ever lands on disk in this context.
  commit:
    name: commit
    needs: regen
    permissions:
      contents: write
      pull-requests: write
      issues: write
    runs-on: ubuntu-latest
    steps:
      - name: Download regenerated VKs
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          name: update-vks-vks
          path: vks-download

      - name: Commit vks/ via Git Data API
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        env:
          PR_NUMBER: ${{ inputs.pr_number }}
          HEAD_REF: ${{ inputs.head_ref }}
          EXPECTED_SHA: ${{ inputs.head_sha }}
          COMMENT_ID: ${{ inputs.comment_id }}
        with:
          script: |
            const fs = require('fs');
            const { owner, repo } = context.repo;
            const branch = process.env.HEAD_REF;
            const expectedSha = process.env.EXPECTED_SHA;
            const prNumber = Number(process.env.PR_NUMBER);

            const files = [
              { path: 'vks/fri_vk.bin',    local: 'vks-download/fri_vk.bin'    },
              { path: 'vks/snark_vk.json', local: 'vks-download/snark_vk.json' },
            ];
            for (const f of files) {
              if (!fs.existsSync(f.local)) {
                core.setFailed(`missing ${f.local}`);
                return;
              }
            }

            const ref = await github.rest.git.getRef({ owner, repo, ref: `heads/${branch}` });
            const headSha = ref.data.object.sha;
            if (headSha !== expectedSha) {
              core.setFailed(`PR head moved (${expectedSha} -> ${headSha})`);
              return;
            }

            const parentCommit = await github.rest.git.getCommit({ owner, repo, commit_sha: headSha });
            const baseTreeSha = parentCommit.data.tree.sha;

            const blobs = [];
            for (const f of files) {
              const blob = await github.rest.git.createBlob({
                owner, repo,
                content: fs.readFileSync(f.local).toString('base64'),
                encoding: 'base64',
              });
              blobs.push({ path: f.path, mode: '100644', type: 'blob', sha: blob.data.sha });
            }

            const tree = await github.rest.git.createTree({
              owner, repo,
              base_tree: baseTreeSha,
              tree: blobs,
            });

            const postComment = (body) => github.rest.issues.createComment({
              owner, repo, issue_number: prNumber, body,
            });
            const react = (content) => github.rest.reactions.createForIssueComment({
              owner, repo, comment_id: Number(process.env.COMMENT_ID), content,
            });

            if (tree.data.sha === baseTreeSha) {
              await postComment(`:white_check_mark: \`vks/\` already up to date.`);
              await react('hooray');
              return;
            }

            const commit = await github.rest.git.createCommit({
              owner, repo,
              message: `chore(vks): refresh committed verification keys`,
              tree: tree.data.sha,
              parents: [headSha],
            });

            await github.rest.git.updateRef({
              owner, repo, ref: `heads/${branch}`, sha: commit.data.sha,
            });

            await postComment(`:white_check_mark: Pushed \`${commit.data.sha}\`.`);
            await react('hooray');

  # React :-1: + post a run link if any earlier job failed.
  notify-failure:
    name: notify-failure
    needs: [build, regen, commit]
    if: ${{ failure() }}
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      issues: write
    steps:
      - name: "React :-1: and comment"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          SERVER_URL: ${{ github.server_url }}
          RUN_ID: ${{ github.run_id }}
          PR_NUMBER: ${{ inputs.pr_number }}
          COMMENT_ID: ${{ inputs.comment_id }}
        run: |
          gh api \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            "repos/${GH_REPO}/issues/comments/${COMMENT_ID}/reactions" \
            -f content='-1' >/dev/null
          run_url="${SERVER_URL}/${GH_REPO}/actions/runs/${RUN_ID}"
          gh pr comment "$PR_NUMBER" --body ":x: [run]($run_url)"
