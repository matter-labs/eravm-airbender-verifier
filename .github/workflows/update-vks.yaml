name: update-vks

# VK regeneration pipeline. Dispatched by `update-vks-dispatch.yaml`.
# Builds the PR's guest, regenerates the VKs inside the trusted Docker
# image, and commits the result to the PR branch.

on:
  workflow_dispatch:
    inputs:
      pr_number:
        type: string
        required: true
      head_repo:
        type: string
        required: true
      head_ref:
        type: string
        required: true
      head_sha:
        type: string
        required: true
      comment_id:
        type: string
        required: true

permissions:
  contents: read

concurrency:
  group: update-vks-${{ inputs.pr_number }}
  cancel-in-progress: false

jobs:
  # Runs `gen-vks` using the host binary + guest dist already built by the
  # PR's `ci-run` workflow (`server-integration-build` job). No Rust
  # compiles in this workflow — the PR-built binaries are downloaded as
  # artifacts. `ci-run` must have completed successfully on `head_sha`
  # before `/update-vks` is invoked; otherwise this job fails fast.
  regen:
    name: regen
    permissions:
      contents: read
      actions: read # download artifacts from another workflow run
    runs-on: matterlabs-ci-hetzner-rtx6000-gpu
    timeout-minutes: 60
    env:
      LD_LIBRARY_PATH: ${{ github.workspace }}/stage/cuda-libs
    steps:
      - name: Locate PR build run
        id: build_run
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          HEAD_REF: ${{ inputs.head_ref }}
          HEAD_SHA: ${{ inputs.head_sha }}
        run: |
          # Scope by branch first so we don't scan unrelated PRs; then
          # precision-filter by head_sha to pick the run for the exact
          # commit, in case the branch has been force-pushed since.
          run_id=$(gh run list \
            --repo "$GH_REPO" \
            --workflow ci-check.yaml \
            --branch "$HEAD_REF" \
            --limit 20 \
            --json databaseId,headSha,status,conclusion \
            --jq "[.[] | select(.headSha == \"$HEAD_SHA\" and .status == \"completed\" and .conclusion == \"success\")] | first | .databaseId // empty")
          if [ -z "$run_id" ]; then
            echo "::error::No successful ci-run found for $HEAD_REF@$HEAD_SHA. Wait for CI to finish and re-comment /update-vks."
            exit 1
          fi
          echo "Using ci-run #$run_id"
          echo "run_id=$run_id" >> "$GITHUB_OUTPUT"

      - name: Download prover-host binary
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          name: eravm-prover-host-bin
          path: stage/bin
          run-id: ${{ steps.build_run.outputs.run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download guest dist
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          name: eravm-prover-server-guest-dist
          path: stage/guest
          run-id: ${{ steps.build_run.outputs.run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download bellman-cuda libraries
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          name: eravm-prover-server-bellman-cuda
          path: stage/cuda-libs
          run-id: ${{ steps.build_run.outputs.run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Make host binary executable
        run: chmod +x stage/bin/eravm-prover-host

      - name: Download SNARK trusted setup
        run: |
          mkdir -p stage/setup
          ./stage/bin/eravm-prover-host download-trusted-setup \
              --output stage/setup/setup.key

      - name: Regenerate VKs
        env:
          ERAVM_PROVER_HOST_GUEST_DIR: ${{ github.workspace }}/stage/guest
          RUST_BACKTRACE: 1
          RUST_MIN_STACK: "134217728"
        run: |
          ulimit -s unlimited
          mkdir -p vks-output
          ./stage/bin/eravm-prover-host gen-vks \
              --output-dir vks-output \
              --trusted-setup stage/setup/setup.key
          ls -lh vks-output

      - name: Upload regenerated VKs
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f3 # v6.0.0
        with:
          name: update-vks-vks
          path: vks-output
          if-no-files-found: error
          retention-days: 1

  # The only job with a write-scoped token. Commits via the Git Data API
  # so no PR file ever lands on disk in this context.
  commit:
    name: commit
    needs: regen
    permissions:
      contents: write
      pull-requests: write
      issues: write
    runs-on: ubuntu-latest
    steps:
      - name: Download regenerated VKs
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          name: update-vks-vks
          path: vks-download

      - name: Commit vks/ via Git Data API
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        env:
          PR_NUMBER: ${{ inputs.pr_number }}
          HEAD_REF: ${{ inputs.head_ref }}
          EXPECTED_SHA: ${{ inputs.head_sha }}
          COMMENT_ID: ${{ inputs.comment_id }}
        with:
          script: |
            const fs = require('fs');
            const { owner, repo } = context.repo;
            const branch = process.env.HEAD_REF;
            const expectedSha = process.env.EXPECTED_SHA;
            const prNumber = Number(process.env.PR_NUMBER);

            const files = [
              { path: 'vks/fri_vk.bin',    local: 'vks-download/fri_vk.bin'    },
              { path: 'vks/snark_vk.json', local: 'vks-download/snark_vk.json' },
            ];
            for (const f of files) {
              if (!fs.existsSync(f.local)) {
                core.setFailed(`missing ${f.local}`);
                return;
              }
            }

            const ref = await github.rest.git.getRef({ owner, repo, ref: `heads/${branch}` });
            const headSha = ref.data.object.sha;
            if (headSha !== expectedSha) {
              core.setFailed(`PR head moved (${expectedSha} -> ${headSha})`);
              return;
            }

            const parentCommit = await github.rest.git.getCommit({ owner, repo, commit_sha: headSha });
            const baseTreeSha = parentCommit.data.tree.sha;

            const blobs = [];
            for (const f of files) {
              const blob = await github.rest.git.createBlob({
                owner, repo,
                content: fs.readFileSync(f.local).toString('base64'),
                encoding: 'base64',
              });
              blobs.push({ path: f.path, mode: '100644', type: 'blob', sha: blob.data.sha });
            }

            const tree = await github.rest.git.createTree({
              owner, repo,
              base_tree: baseTreeSha,
              tree: blobs,
            });

            const postComment = (body) => github.rest.issues.createComment({
              owner, repo, issue_number: prNumber, body,
            });
            const react = (content) => github.rest.reactions.createForIssueComment({
              owner, repo, comment_id: Number(process.env.COMMENT_ID), content,
            });

            if (tree.data.sha === baseTreeSha) {
              await postComment(`:white_check_mark: \`vks/\` already up to date.`);
              await react('hooray');
              return;
            }

            const commit = await github.rest.git.createCommit({
              owner, repo,
              message: `chore(vks): refresh committed verification keys`,
              tree: tree.data.sha,
              parents: [headSha],
            });

            await github.rest.git.updateRef({
              owner, repo, ref: `heads/${branch}`, sha: commit.data.sha,
            });

            await postComment(`:white_check_mark: Pushed \`${commit.data.sha}\`.`);
            await react('hooray');

  # React :-1: + post a run link if any earlier job failed.
  notify-failure:
    name: notify-failure
    needs: [regen, commit]
    if: ${{ failure() }}
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      issues: write
    steps:
      - name: "React :-1: and comment"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          SERVER_URL: ${{ github.server_url }}
          RUN_ID: ${{ github.run_id }}
          PR_NUMBER: ${{ inputs.pr_number }}
          COMMENT_ID: ${{ inputs.comment_id }}
        run: |
          gh api \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            "repos/${GH_REPO}/issues/comments/${COMMENT_ID}/reactions" \
            -f content='-1' >/dev/null
          run_url="${SERVER_URL}/${GH_REPO}/actions/runs/${RUN_ID}"
          gh pr comment "$PR_NUMBER" --body ":x: [run]($run_url)"
