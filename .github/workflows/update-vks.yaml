name: update-vks

# Comment-listener that regenerates the FRI and SNARK verification keys and
# commits them back to the PR branch on `/update-vks`.
#
# Security model:
#   - Workflow-level permissions are `contents: read` only. Each job opts
#     into the narrower scope it needs.
#   - The host binary that produces the committed VKs comes from the trusted
#     Docker image built off `main` (`ghcr.io/<repo>:latest`). PR-author code
#     never compiles the binary that runs `gen-vks`.
#   - The `guest-build` job runs PR code (cargo + airbender), but with a
#     read-only token, no PR-secret access, and `persist-credentials: false`.
#   - The `commit` job holds the only write-scoped token. It runs no Rust,
#     no PR code — it just downloads the regenerated `vks/` artifact and
#     pushes it back.
#
# Fork PRs are rejected because the default `GITHUB_TOKEN` cannot push to a
# fork's branch.

on:
  issue_comment:
    types: [created]

permissions:
  contents: read

concurrency:
  group: update-vks-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  # ---------------------------------------------------------------------------
  # Gate the rest of the workflow on: PR-only, slash-command match, author has
  # write access, head branch lives in this repo. Reacts :eyes: on the
  # triggering comment.
  # ---------------------------------------------------------------------------
  trigger:
    name: trigger
    if: ${{ github.event.issue.pull_request && startsWith(github.event.comment.body, '/update-vks') }}
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
      issues: write # reacting to an issue_comment is on the issues API surface
    outputs:
      head_repo: ${{ steps.resolve.outputs.head_repo }}
      head_ref: ${{ steps.resolve.outputs.head_ref }}
      head_sha: ${{ steps.resolve.outputs.head_sha }}
      pr_number: ${{ github.event.issue.number }}
    steps:
      - name: Verify author has write access
        env:
          ASSOC: ${{ github.event.comment.author_association }}
        run: |
          case "$ASSOC" in
            OWNER|MEMBER|COLLABORATOR) ;;
            *) echo "::error::/update-vks must be triggered by a repo collaborator (author_association: $ASSOC)"; exit 1 ;;
          esac

      - name: "React :eyes: to trigger comment"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            "repos/${{ github.repository }}/issues/comments/${{ github.event.comment.id }}/reactions" \
            -f content='eyes' >/dev/null

      - name: Resolve PR head
        id: resolve
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          pr=$(gh api "repos/${{ github.repository }}/pulls/${{ github.event.issue.number }}")
          head_repo=$(echo "$pr" | jq -r .head.repo.full_name)
          head_ref=$(echo "$pr" | jq -r .head.ref)
          head_sha=$(echo "$pr" | jq -r .head.sha)
          echo "head_repo=$head_repo" >> "$GITHUB_OUTPUT"
          echo "head_ref=$head_ref"   >> "$GITHUB_OUTPUT"
          echo "head_sha=$head_sha"   >> "$GITHUB_OUTPUT"
          echo "Resolved PR head: $head_repo @ $head_ref ($head_sha)"

      - name: Reject fork PRs
        env:
          HEAD_REPO: ${{ steps.resolve.outputs.head_repo }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "$HEAD_REPO" != "${{ github.repository }}" ]; then
            echo "::error::PR head is in a fork ($HEAD_REPO); GITHUB_TOKEN cannot push there."
            gh pr comment "${{ github.event.issue.number }}" --body \
              ":x: \`/update-vks\` cannot push to fork branches. Run \`cargo run -p eravm-prover-host --features snark_gpu -- gen-vks --output-dir vks --trusted-setup <CRS>\` locally and push the result."
            exit 1
          fi

  # ---------------------------------------------------------------------------
  # Build only the guest binary from the PR head. This is the one job that
  # compiles PR-author-controlled Rust (build.rs, proc-macros, deps), so it
  # is kept on a read-only token with no credentials persisted in the
  # workspace. Its output is treated as untrusted input by the regen job.
  # ---------------------------------------------------------------------------
  guest-build:
    name: guest-build
    needs: trigger
    permissions:
      contents: read
    runs-on: matterlabs-ci-runner-high-performance
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          repository: ${{ needs.trigger.outputs.head_repo }}
          ref: ${{ needs.trigger.outputs.head_sha }}
          persist-credentials: false

      - name: Checkout airbender-platform
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          repository: matter-labs/airbender-platform
          ref: 5b1e81043ed03ea4e215510e9653eace5d09c50f
          path: airbender-platform
          persist-credentials: false

      - name: Install linux packages
        shell: 'bash -ex {0}'
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          if command -v sudo >/dev/null 2>&1; then SUDO=sudo; fi
          ${SUDO} apt-get update
          ${SUDO} apt-get install -y libclang-dev clang

      - name: Install Rust toolchain
        uses: moonrepo/setup-rust@ede6de059f8046a5e236c94046823e2af11ca670 # v1.2.2
        with:
          inherit-toolchain: true

      - name: Install cargo-binutils
        working-directory: ./airbender-platform
        run: cargo install cargo-binutils --locked --force

      - name: Install cargo-airbender
        working-directory: ./airbender-platform
        run: cargo install --path crates/cargo-airbender --locked --no-default-features --force

      - name: Build guest
        working-directory: ./guest
        run: cargo airbender build

      - name: Upload guest dist
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f3 # v6.0.0
        with:
          name: update-vks-guest-dist
          path: guest/dist/app
          if-no-files-found: error
          retention-days: 1

  # ---------------------------------------------------------------------------
  # Run `gen-vks` on the GPU runner using the trusted Docker image. No Rust
  # is compiled here; no PR code is executed (the host binary computes a VK
  # from the guest binary's bytes, it does not run the guest). Token is
  # read-only and never touches the repo.
  # ---------------------------------------------------------------------------
  regen:
    name: regen
    needs: [trigger, guest-build]
    permissions:
      contents: read
      packages: read # pull from ghcr.io
    runs-on: matterlabs-ci-hetzner-rtx6000-gpu
    timeout-minutes: 60
    env:
      IMAGE: ghcr.io/${{ github.repository }}:latest
    steps:
      - name: Download guest dist
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          name: update-vks-guest-dist
          path: stage/guest

      - name: Log in to ghcr.io
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull trusted host image
        run: docker pull "$IMAGE"

      - name: Prepare output directory
        run: |
          mkdir -p vks-output
          chmod 777 vks-output

      - name: Run gen-vks inside the trusted image
        run: |
          docker run --rm \
            --gpus all \
            --ulimit stack=-1 \
            -v "${{ github.workspace }}/stage/guest:/guest-pr:ro" \
            -v "${{ github.workspace }}/vks-output:/vks-output" \
            -e ERAVM_PROVER_HOST_GUEST_DIR=/guest-pr \
            -e RUST_BACKTRACE=1 \
            -e RUST_MIN_STACK=134217728 \
            --entrypoint /bin/sh \
            "$IMAGE" \
            -c "ulimit -s unlimited && /usr/local/bin/eravm-prover-host gen-vks --output-dir /vks-output --trusted-setup /setup/setup.key"
          ls -lh vks-output

      - name: Upload regenerated VKs
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f3 # v6.0.0
        with:
          name: update-vks-vks
          path: vks-output
          if-no-files-found: error
          retention-days: 1

  # ---------------------------------------------------------------------------
  # The only job with a write-scoped token. It runs zero Rust, no PR code,
  # and does not touch the guest or the host binary — just `cp` and `git`.
  # ---------------------------------------------------------------------------
  commit:
    name: commit
    needs: [trigger, regen]
    permissions:
      contents: write
      pull-requests: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          repository: ${{ needs.trigger.outputs.head_repo }}
          ref: ${{ needs.trigger.outputs.head_ref }}
          persist-credentials: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify head is unchanged
        env:
          EXPECTED_SHA: ${{ needs.trigger.outputs.head_sha }}
        run: |
          actual=$(git rev-parse HEAD)
          if [ "$actual" != "$EXPECTED_SHA" ]; then
            echo "::error::PR head moved between trigger ($EXPECTED_SHA) and checkout ($actual). Re-run /update-vks."
            exit 1
          fi

      - name: Download regenerated VKs
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          name: update-vks-vks
          path: vks-download

      - name: Copy regenerated VKs into vks/
        run: |
          mkdir -p vks
          # Only the canonical filenames are accepted; anything else would be
          # an unexpected artifact and we'd rather fail than commit it.
          for f in fri_vk.bin snark_vk.json; do
            if [ ! -f "vks-download/$f" ]; then
              echo "::error::Expected $f in regenerated VK artifact"
              exit 1
            fi
            cp -v "vks-download/$f" "vks/$f"
          done

      - name: Commit and push if changed
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ needs.trigger.outputs.pr_number }}
          HEAD_REF: ${{ needs.trigger.outputs.head_ref }}
        run: |
          if git diff --quiet -- vks/; then
            echo "::notice::vks/ already matches the regenerated keys; nothing to commit."
            gh pr comment "$PR_NUMBER" --body \
              ":white_check_mark: \`/update-vks\`: \`vks/\` already matches the regenerated keys."
            exit 0
          fi

          git diff --stat -- vks/

          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -- vks/
          git commit \
            -m "chore(vks): refresh committed verification keys" \
            -m "Regenerated by \`/update-vks\` on ${{ needs.trigger.outputs.head_sha }}."

          git push origin "HEAD:${HEAD_REF}"

          new_sha=$(git rev-parse HEAD)
          gh pr comment "$PR_NUMBER" --body \
            ":white_check_mark: \`/update-vks\`: pushed refreshed \`vks/\` as \`$new_sha\`."

      - name: "React :tada: on success"
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            "repos/${{ github.repository }}/issues/comments/${{ github.event.comment.id }}/reactions" \
            -f content='hooray' >/dev/null

  # ---------------------------------------------------------------------------
  # Leave a clear note on the PR (and react :-1:) if any earlier job failed,
  # so the trigger comment isn't stuck on :eyes: forever.
  # ---------------------------------------------------------------------------
  notify-failure:
    name: notify-failure
    needs: [trigger, guest-build, regen, commit]
    if: ${{ failure() && needs.trigger.result == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      issues: write
    steps:
      - name: "React :-1: and comment"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            "repos/${{ github.repository }}/issues/comments/${{ github.event.comment.id }}/reactions" \
            -f content='-1' >/dev/null
          run_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          gh pr comment "${{ needs.trigger.outputs.pr_number }}" --body \
            ":x: \`/update-vks\` failed. See [the workflow run]($run_url) for details."
