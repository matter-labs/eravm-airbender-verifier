name: update-vks

# VK regeneration pipeline. Triggered manually via
# `gh workflow run update-vks.yaml -f pr_number=… -f head_repo=… …`,
# which the `update-vks-dispatch.yaml` comment listener invokes on every
# `/update-vks` from a repo collaborator.
#
# Why workflow_dispatch instead of issue_comment? CodeQL classifies
# `issue_comment` (and `pull_request_target`, `workflow_run`-from-untrusted)
# as inherently privileged-but-reachable-from-untrusted contexts, and
# flags every step that runs PR-controlled code in them. workflow_dispatch
# requires write access to invoke, so the same build + commit pipeline
# stops tripping cache-poisoning / untrusted-checkout heuristics.
#
# Security model:
#   - Workflow-level permissions are `contents: read` only; each job opts
#     into the narrower scope it needs.
#   - `guest-build` runs PR-author cargo (build.rs, proc-macros, deps),
#     but with a read-only token, no credentials persisted, and no
#     actions-cache writes.
#   - `regen` runs `gen-vks` inside the trusted `ghcr.io/<repo>:latest`
#     image (built off main). PR-author code never compiles the binary
#     that writes the committed VKs.
#   - `commit` is the only job with a write token. It runs no Rust, no
#     shell, no actions/checkout — just `actions/github-script` driving
#     the Git Data API on the regenerated VK artifact.
#
# Fork PRs are rejected by `update-vks-dispatch.yaml` before this workflow
# is invoked because the default `GITHUB_TOKEN` cannot push to a fork.

on:
  workflow_dispatch:
    inputs:
      pr_number:
        type: string
        required: true
      head_repo:
        type: string
        required: true
      head_ref:
        type: string
        required: true
      head_sha:
        type: string
        required: true
      comment_id:
        type: string
        required: true

permissions:
  contents: read

concurrency:
  group: update-vks-${{ inputs.pr_number }}
  cancel-in-progress: false

jobs:
  # ---------------------------------------------------------------------------
  # Build only the guest binary from the PR head. This is the one job that
  # compiles PR-author-controlled Rust (build.rs, proc-macros, deps), so it
  # runs on a read-only token, with `persist-credentials: false`, and with
  # `actions/cache` disabled.
  # ---------------------------------------------------------------------------
  guest-build:
    name: guest-build
    permissions:
      contents: read
    runs-on: matterlabs-ci-runner-high-performance
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          repository: ${{ inputs.head_repo }}
          ref: ${{ inputs.head_sha }}
          persist-credentials: false

      - name: Checkout airbender-platform
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          repository: matter-labs/airbender-platform
          ref: 5b1e81043ed03ea4e215510e9653eace5d09c50f
          path: airbender-platform
          persist-credentials: false

      - name: Install linux packages
        shell: 'bash -ex {0}'
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          if command -v sudo >/dev/null 2>&1; then SUDO=sudo; fi
          ${SUDO} apt-get update
          ${SUDO} apt-get install -y libclang-dev clang

      - name: Install Rust toolchain
        uses: moonrepo/setup-rust@ede6de059f8046a5e236c94046823e2af11ca670 # v1.2.2
        with:
          inherit-toolchain: true
          # Belt-and-braces: even though workflow_dispatch is outside
          # CodeQL's privileged set, we still avoid the actions/cache that
          # setup-rust enables by default so PR code can't write entries
          # that later main builds might read.
          cache: false

      - name: Install cargo-binutils
        working-directory: ./airbender-platform
        run: cargo install cargo-binutils --locked --force

      - name: Install cargo-airbender
        working-directory: ./airbender-platform
        run: cargo install --path crates/cargo-airbender --locked --no-default-features --force

      - name: Build guest
        working-directory: ./guest
        run: cargo airbender build

      - name: Upload guest dist
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f3 # v6.0.0
        with:
          name: update-vks-guest-dist
          path: guest/dist/app
          if-no-files-found: error
          retention-days: 1

  # ---------------------------------------------------------------------------
  # Run `gen-vks` on the GPU runner using the trusted Docker image. No Rust
  # is compiled here; no PR code is executed (the host binary computes a VK
  # from the guest binary's bytes, it does not run the guest).
  # ---------------------------------------------------------------------------
  regen:
    name: regen
    needs: guest-build
    permissions:
      contents: read
      packages: read # pull from ghcr.io
    runs-on: matterlabs-ci-hetzner-rtx6000-gpu
    timeout-minutes: 60
    env:
      IMAGE: ghcr.io/${{ github.repository }}:latest
    steps:
      - name: Download guest dist
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          name: update-vks-guest-dist
          path: stage/guest

      - name: Log in to ghcr.io
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull trusted host image
        run: docker pull "$IMAGE"

      - name: Prepare output directory
        run: |
          mkdir -p vks-output
          chmod 777 vks-output

      - name: Run gen-vks inside the trusted image
        run: |
          docker run --rm \
            --gpus all \
            --ulimit stack=-1 \
            -v "${{ github.workspace }}/stage/guest:/guest-pr:ro" \
            -v "${{ github.workspace }}/vks-output:/vks-output" \
            -e ERAVM_PROVER_HOST_GUEST_DIR=/guest-pr \
            -e RUST_BACKTRACE=1 \
            -e RUST_MIN_STACK=134217728 \
            --entrypoint /bin/sh \
            "$IMAGE" \
            -c "ulimit -s unlimited && /usr/local/bin/eravm-prover-host gen-vks --output-dir /vks-output --trusted-setup /setup/setup.key"
          ls -lh vks-output

      - name: Upload regenerated VKs
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f3 # v6.0.0
        with:
          name: update-vks-vks
          path: vks-output
          if-no-files-found: error
          retention-days: 1

  # ---------------------------------------------------------------------------
  # The only job with a write-scoped token. Commits via the Git Data REST
  # API — no `actions/checkout`, no PR files on disk, no shell, no chance
  # of an `.gitattributes` / hook / build script from the PR executing in
  # this privileged context. The vks artifact is the only PR-derived input
  # and is treated as opaque bytes.
  # ---------------------------------------------------------------------------
  commit:
    name: commit
    needs: regen
    permissions:
      contents: write
      pull-requests: write
      issues: write
    runs-on: ubuntu-latest
    steps:
      - name: Download regenerated VKs
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          name: update-vks-vks
          path: vks-download

      - name: Commit vks/ via Git Data API
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        env:
          PR_NUMBER: ${{ inputs.pr_number }}
          HEAD_REF: ${{ inputs.head_ref }}
          EXPECTED_SHA: ${{ inputs.head_sha }}
          COMMENT_ID: ${{ inputs.comment_id }}
        with:
          script: |
            const fs = require('fs');
            const { owner, repo } = context.repo;
            const branch = process.env.HEAD_REF;
            const expectedSha = process.env.EXPECTED_SHA;
            const prNumber = Number(process.env.PR_NUMBER);

            // Canonical filenames only. Anything else in the artifact is
            // unexpected and we'd rather fail than commit it.
            const files = [
              { path: 'vks/fri_vk.bin',    local: 'vks-download/fri_vk.bin'    },
              { path: 'vks/snark_vk.json', local: 'vks-download/snark_vk.json' },
            ];
            for (const f of files) {
              if (!fs.existsSync(f.local)) {
                core.setFailed(`expected ${f.local} in regenerated VK artifact`);
                return;
              }
            }

            // Refuse to push if the PR head moved between trigger validation
            // and this step — better to fail and ask for a re-run than to
            // surprise the author with a commit on a SHA they have since
            // rebased away from.
            const ref = await github.rest.git.getRef({ owner, repo, ref: `heads/${branch}` });
            const headSha = ref.data.object.sha;
            if (headSha !== expectedSha) {
              core.setFailed(`PR head moved (${expectedSha} -> ${headSha}); re-run /update-vks`);
              return;
            }

            const parentCommit = await github.rest.git.getCommit({ owner, repo, commit_sha: headSha });
            const baseTreeSha = parentCommit.data.tree.sha;

            const blobs = [];
            for (const f of files) {
              const blob = await github.rest.git.createBlob({
                owner, repo,
                content: fs.readFileSync(f.local).toString('base64'),
                encoding: 'base64',
              });
              blobs.push({ path: f.path, mode: '100644', type: 'blob', sha: blob.data.sha });
            }

            const tree = await github.rest.git.createTree({
              owner, repo,
              base_tree: baseTreeSha,
              tree: blobs,
            });

            const postComment = (body) => github.rest.issues.createComment({
              owner, repo, issue_number: prNumber, body,
            });
            const react = (content) => github.rest.reactions.createForIssueComment({
              owner, repo, comment_id: Number(process.env.COMMENT_ID), content,
            });

            if (tree.data.sha === baseTreeSha) {
              core.info(`vks/ already matches; nothing to commit`);
              await postComment(`:white_check_mark: \`/update-vks\`: \`vks/\` already matches the regenerated keys.`);
              await react('hooray');
              return;
            }

            const commit = await github.rest.git.createCommit({
              owner, repo,
              message: `chore(vks): refresh committed verification keys\n\nRegenerated by /update-vks on ${expectedSha}.`,
              tree: tree.data.sha,
              parents: [headSha],
            });

            await github.rest.git.updateRef({
              owner, repo, ref: `heads/${branch}`, sha: commit.data.sha,
            });

            core.info(`pushed commit ${commit.data.sha} to ${branch}`);
            await postComment(`:white_check_mark: \`/update-vks\`: pushed refreshed \`vks/\` as \`${commit.data.sha}\`.`);
            await react('hooray');

  # ---------------------------------------------------------------------------
  # Leave a clear note on the PR (and react :-1: on the triggering comment)
  # if any earlier job failed, so the comment isn't stuck on :eyes: forever.
  # ---------------------------------------------------------------------------
  notify-failure:
    name: notify-failure
    needs: [guest-build, regen, commit]
    if: ${{ failure() }}
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      issues: write
    steps:
      - name: "React :-1: and comment"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ inputs.pr_number }}
          COMMENT_ID: ${{ inputs.comment_id }}
        run: |
          gh api \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            "repos/${{ github.repository }}/issues/comments/${COMMENT_ID}/reactions" \
            -f content='-1' >/dev/null
          run_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          gh pr comment "$PR_NUMBER" --body \
            ":x: \`/update-vks\` failed. See [the workflow run]($run_url) for details."
