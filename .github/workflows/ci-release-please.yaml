name: ci-run-release-please

# Give permissions to the release-please bot to open and update PRs
# and commit version updates across the shared release files
permissions:
  contents: write
  pull-requests: write
  id-token: write
  issues: write

# Run the workflow on push to the main branch and manually
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  # Prepare the release PR with changelog updates and create github releases.
  # Docker images are published by docker-build.yaml on the underlying main
  # commit, so this workflow only handles release-please bookkeeping.
  release-please:
    uses: matter-labs/zksync-ci-common/.github/workflows/release-please.yaml@v1
    secrets:
      gh_token: ${{ secrets.RELEASE_TOKEN }}
      slack_webhook: ${{ secrets.SLACK_WEBHOOK }}
    with:
      config: '.github/release-please/config.json'
      manifest: '.github/release-please/manifest.json'
      upgrade-dependencies: false
      # Cargo crate versions are intentionally DECOUPLED from the release
      # version. The release lives only in the git tag / changelog / docker
      # image; no Cargo.toml carries it (config.json has no extra-files).
      #
      # `update-cargo-lock: true` runs `cargo workspaces version custom <ver>
      # --force "*"` in the shared workflow, forcing every member crate to the
      # release version. That rewrites the versions of the guest's compile
      # closure, which feeds rustc's -Cmetadata / StableCrateId and so rebuilds
      # guest/dist/app/app.bin — rotating the FRI VK (which embeds
      # sha256(app.bin)) — on every release, even with zero guest source
      # changes. Keeping this false freezes the versions so a release never
      # perturbs the guest binary or the VKs.
      update-cargo-lock: false
      publish-to-crates-io: false
      notify-slack: true
