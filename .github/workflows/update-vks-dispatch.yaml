name: update-vks-dispatch

# Comment listener for `/update-vks`. Validates the trigger and dispatches
# `update-vks.yaml`. Never checks out PR code.

on:
  issue_comment:
    types: [created]

permissions:
  issues: write
  pull-requests: read
  actions: write

concurrency:
  group: update-vks-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  dispatch:
    name: dispatch
    if: ${{ github.event.issue.pull_request && startsWith(github.event.comment.body, '/update-vks') }}
    runs-on: ubuntu-latest
    steps:
      - name: Verify author has write access
        env:
          ASSOC: ${{ github.event.comment.author_association }}
        run: |
          case "$ASSOC" in
            OWNER|MEMBER|COLLABORATOR) ;;
            *) echo "::error::author_association=$ASSOC"; exit 1 ;;
          esac

      - name: "React :eyes:"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            "repos/${{ github.repository }}/issues/comments/${{ github.event.comment.id }}/reactions" \
            -f content='eyes' >/dev/null

      - name: Resolve PR head and dispatch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.issue.number }}
          COMMENT_ID: ${{ github.event.comment.id }}
        run: |
          pr=$(gh api "repos/${{ github.repository }}/pulls/${PR_NUMBER}")
          head_repo=$(echo "$pr" | jq -r .head.repo.full_name)
          head_ref=$(echo "$pr"  | jq -r .head.ref)
          head_sha=$(echo "$pr"  | jq -r .head.sha)

          if [ "$head_repo" != "${{ github.repository }}" ]; then
            gh pr comment "$PR_NUMBER" --body ":x: \`/update-vks\`: fork PRs are not supported."
            exit 1
          fi

          gh workflow run update-vks.yaml \
            --ref "${{ github.event.repository.default_branch }}" \
            -f "pr_number=$PR_NUMBER" \
            -f "head_repo=$head_repo" \
            -f "head_ref=$head_ref" \
            -f "head_sha=$head_sha" \
            -f "comment_id=$COMMENT_ID"
