name: update-vks-dispatch

# Comment listener for `/update-vks`. Runs in the `issue_comment` context
# (privileged: GITHUB_TOKEN can write to the repo, comments come from
# arbitrary users), and is intentionally tiny: it only checks the trigger,
# resolves the PR head, and then `gh workflow run`s the actual build
# pipeline at `update-vks.yaml`. No `actions/checkout`, no PR code on disk,
# no `cargo` / `docker run` against PR-controlled inputs.
#
# The build pipeline runs as `workflow_dispatch`, which CodeQL does not
# classify as a privileged-but-untrusted trigger: it requires write access
# to invoke, so collaborator-controlled PR code never executes in an
# `issue_comment`-flavored context.

on:
  issue_comment:
    types: [created]

# Bare minimum: react to comments + look up the PR + invoke the
# `update-vks.yaml` workflow_dispatch.
permissions:
  issues: write
  pull-requests: read
  actions: write

concurrency:
  group: update-vks-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  dispatch:
    name: dispatch
    if: ${{ github.event.issue.pull_request && startsWith(github.event.comment.body, '/update-vks') }}
    runs-on: ubuntu-latest
    steps:
      - name: Verify author has write access
        env:
          ASSOC: ${{ github.event.comment.author_association }}
        run: |
          case "$ASSOC" in
            OWNER|MEMBER|COLLABORATOR) ;;
            *) echo "::error::/update-vks must be triggered by a repo collaborator (author_association: $ASSOC)"; exit 1 ;;
          esac

      - name: "React :eyes: to trigger comment"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            "repos/${{ github.repository }}/issues/comments/${{ github.event.comment.id }}/reactions" \
            -f content='eyes' >/dev/null

      - name: Resolve PR head and dispatch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.issue.number }}
          COMMENT_ID: ${{ github.event.comment.id }}
        run: |
          pr=$(gh api "repos/${{ github.repository }}/pulls/${PR_NUMBER}")
          head_repo=$(echo "$pr" | jq -r .head.repo.full_name)
          head_ref=$(echo "$pr"  | jq -r .head.ref)
          head_sha=$(echo "$pr"  | jq -r .head.sha)
          echo "Resolved PR head: $head_repo @ $head_ref ($head_sha)"

          if [ "$head_repo" != "${{ github.repository }}" ]; then
            echo "::error::PR head is in a fork ($head_repo); GITHUB_TOKEN cannot push there."
            gh pr comment "$PR_NUMBER" --body \
              ":x: \`/update-vks\` cannot push to fork branches. Run \`cargo run -p eravm-prover-host --features snark_gpu -- gen-vks --output-dir vks --trusted-setup <CRS>\` locally and push the result."
            exit 1
          fi

          # `gh workflow run` against `update-vks.yaml` on the default
          # branch. workflow_dispatch is the only trigger CodeQL doesn't
          # treat as inherently privileged-but-untrusted, which is the
          # whole reason for the split.
          gh workflow run update-vks.yaml \
            --ref "${{ github.event.repository.default_branch }}" \
            -f "pr_number=$PR_NUMBER" \
            -f "head_repo=$head_repo" \
            -f "head_ref=$head_ref" \
            -f "head_sha=$head_sha" \
            -f "comment_id=$COMMENT_ID"
