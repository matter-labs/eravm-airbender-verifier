name: ci-run

on:
  pull_request:
  merge_group:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: check-${{ github.ref }}
  cancel-in-progress: true

env:
  CI_BATCHES: 506093.bin.gz,506155.bin.gz,506169.bin.gz

jobs:
  lints:
    name: lints
    runs-on: ubuntu-latest
    env:
      ZKSYNC_USE_CUDA_STUBS: true
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Install Rust toolchain
        uses: moonrepo/setup-rust@ede6de059f8046a5e236c94046823e2af11ca670 # v1.2.2
        with:
          inherit-toolchain: true

      - name: Install rustfmt and clippy
        run: rustup component add rustfmt clippy

      - name: Rustfmt
        run: cargo fmt --all --check

      # The Airbender guest is built via `cargo-airbender`, not plain Cargo targets.
      - name: Clippy
        run: cargo clippy --workspace --all-targets --exclude eravm-prover-guest --locked -- -D warnings

  tests:
    name: tests
    runs-on: matterlabs-ci-runner-high-performance
    env:
      ZKSYNC_USE_CUDA_STUBS: true
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Install Rust toolchain
        uses: moonrepo/setup-rust@ede6de059f8046a5e236c94046823e2af11ca670 # v1.2.2
        with:
          inherit-toolchain: true

      # The Airbender guest is built via `cargo-airbender`, not plain Cargo targets.
      - name: Run tests
        run: cargo test --workspace --exclude eravm-prover-guest --locked

  vm-compare-batches:
    name: vm-compare-batches
    runs-on: matterlabs-ci-runner-high-performance
    env:
      ZKSYNC_USE_CUDA_STUBS: true
      BATCHES_DIR: testdata/era_mainnet_batches/binary
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Install linux packages
        shell: 'bash -ex {0}'
        env:
          DEBIAN_FRONTEND: noninteractive
        if: ${{ runner.os == 'Linux' }}
        run: |
          if command -v sudo >/dev/null 2>&1; then
            SUDO=sudo
          fi
          ${SUDO} apt update && ${SUDO} apt install -y git-lfs

      - name: Install Git LFS
        run: git lfs install --local

      - name: Pull CI mainnet batches
        run: ./scripts/fetch_lfs_batches.sh "$CI_BATCHES"

      - name: Install Rust toolchain
        uses: moonrepo/setup-rust@ede6de059f8046a5e236c94046823e2af11ca670 # v1.2.2
        with:
          inherit-toolchain: true

      - name: Compare CI batches
        run: |
          cargo run --release -p zksync_vm_compare --locked --bin vm_compare -- \
            --batches-dir "$BATCHES_DIR" \
            --batch-files "$CI_BATCHES"

  host-run-batches:
    name: host-run-batches
    runs-on: matterlabs-ci-runner-high-performance
    # Prebuilt cargo-airbender image (CPU, no CUDA toolkit) published by
    # airbender-platform's ci-release pipeline at this tag. Pinned to the
    # same tag as the Rust deps in Cargo.toml so the CLI and the airbender-*
    # crates stay in lockstep. Ships nightly Rust + cargo-binutils +
    # cargo-airbender, so the per-step installs are no longer needed.
    container:
      image: ghcr.io/matter-labs/cargo-airbender:0.0.1
    env:
      ZKSYNC_USE_CUDA_STUBS: true
      BATCHES_DIR: testdata/era_mainnet_batches/binary
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Install linux packages
        shell: 'bash -ex {0}'
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          apt-get update && apt-get install -y libclang-dev git-lfs

      - name: Install Git LFS
        run: git lfs install --local

      - name: Pull CI mainnet batches
        run: ./scripts/fetch_lfs_batches.sh "$CI_BATCHES"

      - name: Build guest
        working-directory: ./guest
        run: cargo airbender build

      - name: Run host execution for CI batches
        run: |
          cargo run --release -p eravm-prover-host --locked -- \
            run \
            --batches-dir "$BATCHES_DIR" \
            --batch-files "$CI_BATCHES"

  # -----------------------------------------------------------------------------
  # Build the prover-server binary and the integration-test binary on a
  # high-performance runner inside the nvidia/cuda devel container. This is the
  # ONLY place where `gpu-prover` (and transitively `era_cudart_sys`,
  # `bellman-cuda`-using crates) compile — the GPU runner has the driver but no
  # toolkit, so cargo on that runner would either fail or hang.
  #
  # The matching run job (`server-integration-run`) downloads these artifacts
  # and executes them on the GPU runner. No `cargo` runs there.
  # -----------------------------------------------------------------------------
  server-integration-build:
    name: server-integration-build
    runs-on: matterlabs-ci-runner-high-performance
    timeout-minutes: 90
    # Prebuilt cargo-airbender CUDA image published by airbender-platform's
    # ci-release pipeline at this tag. Pinned to the same tag as the Rust
    # deps in Cargo.toml so the CLI and the airbender-* crates stay in
    # lockstep. Ships nightly Rust + cargo-binutils + cargo-airbender +
    # clang + cmake + the CUDA 12.9 devel toolchain — no manual install
    # steps required.
    container:
      image: ghcr.io/matter-labs/cargo-airbender-cuda:0.0.1
    env:
      # The runtime runner is an RTX 6000 Ada (sm_89). Match prove-batch.yaml.
      CUDA_ARCH: "89"
      CUDAARCHS: "89"
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      # sccache (RUSTC_WRAPPER) wired to matterlabs's GCS bucket. Same
      # composite used by build-host in prove-batch.yaml.
      - name: Setup runner
        uses: matter-labs/zksync-os-server/.github/actions/runner-setup@24d38529dbeb2f0bdd016005b1e5e0bc491b692f

      - name: Install extra apt packages
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          apt-get update && apt-get install -y libclang-dev

      - name: Inspect toolchain
        run: |
          nvcc --version
          cmake --version
          rustc --version

      # Build era-bellman-cuda — `zksync-crypto-gpu`'s `gpu-ffi` build script
      # reads `BELLMAN_CUDA_DIR` from the env. Without it, linking gpu-prover
      # fails or stalls. (Same pattern as prove-batch.yaml's build-host.)
      - name: Build era-bellman-cuda
        run: |
          git clone --depth=1 https://github.com/matter-labs/era-bellman-cuda.git
          cmake -B era-bellman-cuda/build -S era-bellman-cuda -DCMAKE_BUILD_TYPE=Release
          cmake --build era-bellman-cuda/build -j"$(nproc)"
          echo "BELLMAN_CUDA_DIR=$(pwd)/era-bellman-cuda" >> "${GITHUB_ENV}"

      - name: Build guest
        working-directory: ./guest
        run: cargo airbender build

      - name: Build eravm-prover-server (snark_gpu)
        env:
          RUST_BACKTRACE: 1
        run: |
          cargo build --release -p eravm-prover-server --locked --features snark_gpu
          ls -lh target/release/eravm-prover-server

      # Compile the integration test binary without running it. cargo emits
      # JSON metadata that tells us the exact path of the test executable
      # (it has a hash-suffixed name in target/release/deps/). Match the
      # server build's `snark_gpu` feature so the test downloads the GPU CRS
      # and the spawned binary's wrapper matches.
      - name: Build integration test binary
        env:
          RUST_BACKTRACE: 1
        run: |
          cargo test --release --locked --features snark_gpu \
            --package eravm-prover-server --test integration_test \
            --no-run --message-format=json > test-build.json
          test_bin=$(jq -r 'select(.executable != null and (.target.name == "integration_test")) | .executable' test-build.json | tail -n1)
          if [ -z "$test_bin" ]; then
            echo "Failed to locate integration_test binary in cargo metadata" >&2
            exit 1
          fi
          echo "Test binary: $test_bin"
          mkdir -p test-stage
          cp -v "$test_bin" test-stage/integration_test

      # Stage runtime CUDA libraries the test/server need on the GPU runner:
      #   - bellman-cuda's own outputs (it isn't in any system path)
      #   - libcudart from the container's CUDA toolkit (the GPU runner has the
      #     driver — `libcuda.so` — but no toolkit, so `libcudart.so.13` is
      #     missing without us shipping it)
      - name: Stage runtime CUDA libraries
        run: |
          mkdir -p bellman-cuda-stage
          find era-bellman-cuda/build -type f \( -name '*.so*' -o -name '*.a' \) -exec cp -v {} bellman-cuda-stage/ \;
          cp -v /usr/local/cuda/lib64/libcudart.so* bellman-cuda-stage/
          ls -lh bellman-cuda-stage/

      - name: Upload prover-server binary
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f3 # v6.0.0
        with:
          name: eravm-prover-server-bin
          path: target/release/eravm-prover-server
          if-no-files-found: error
          retention-days: 1

      - name: Upload integration test binary
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f3 # v6.0.0
        with:
          name: eravm-prover-server-integration-test
          path: test-stage/integration_test
          if-no-files-found: error
          retention-days: 1

      - name: Upload guest dist
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f3 # v6.0.0
        with:
          name: eravm-prover-server-guest-dist
          path: guest/dist/app
          if-no-files-found: error
          retention-days: 1

      - name: Upload bellman-cuda libraries
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f3 # v6.0.0
        with:
          name: eravm-prover-server-bellman-cuda
          path: bellman-cuda-stage
          if-no-files-found: error
          retention-days: 1

      - name: sccache stats
        if: always()
        run: sccache --show-stats || true

  # -----------------------------------------------------------------------------
  # Run the prebuilt integration test on the GPU runner. No cargo here — only
  # the prebuilt binaries from server-integration-build, plus the staged CUDA
  # runtime libs and the LFS batch. The test binary picks up paths via IT_*
  # env vars (its baked-in CARGO_MANIFEST_DIR / CARGO_BIN_EXE_* point to the
  # build runner's filesystem).
  # -----------------------------------------------------------------------------
  server-integration-run:
    name: server-integration-run
    needs: server-integration-build
    # RTX 6000 Ada (48GB VRAM) — required for the airbender prover. The
    # default `matterlabs-ci-gpu-runner` (L4, 22GB) OOMs during proving.
    # Same runner used by prove-batch.yaml.
    runs-on: matterlabs-ci-hetzner-rtx6000-gpu
    timeout-minutes: 20
    steps:
      # Need the repo for `scripts/fetch_lfs_batches.sh` and the testdata path.
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Install git-lfs
        shell: 'bash -ex {0}'
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          if command -v sudo >/dev/null 2>&1; then SUDO=sudo; fi
          ${SUDO} apt-get update
          ${SUDO} apt-get install -y git-lfs

      - name: Pull batch 506093
        run: |
          git lfs install --local
          ./scripts/fetch_lfs_batches.sh 506093.bin.gz

      - name: Download prover-server binary
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          name: eravm-prover-server-bin
          path: stage/bin

      - name: Download integration test binary
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          name: eravm-prover-server-integration-test
          path: stage/bin

      - name: Download guest dist
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          name: eravm-prover-server-guest-dist
          path: stage/guest

      - name: Download bellman-cuda libraries
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          name: eravm-prover-server-bellman-cuda
          path: stage/cuda-libs

      - name: Make binaries executable
        run: |
          chmod +x stage/bin/eravm-prover-server stage/bin/integration_test
          ls -lh stage/bin stage/cuda-libs stage/guest

      - name: Run prover server integration test
        env:
          # The test binary uses the IT_* overrides because its baked-in
          # CARGO_MANIFEST_DIR and CARGO_BIN_EXE_* point to the build runner.
          IT_PROVER_SERVER_BIN: ${{ github.workspace }}/stage/bin/eravm-prover-server
          IT_GUEST_DIST_DIR: ${{ github.workspace }}/stage/guest
          IT_BATCHES_DIR: ${{ github.workspace }}/testdata/era_mainnet_batches/binary
          # libcudart and bellman-cuda's .so live in the staged dir.
          LD_LIBRARY_PATH: ${{ github.workspace }}/stage/cuda-libs
          RUST_BACKTRACE: 1
          # Default stack size for any Rust-spawned thread that doesn't set
          # one via `Builder::stack_size`. SNARK wrapping needs much more than
          # the 2 MB default; the server's prover thread already overrides
          # this explicitly, but inner library threads inherit this.
          RUST_MIN_STACK: "134217728"
        run: |
          # SNARK wrapper recursion needs a large stack — see README.md.
          ulimit -s unlimited
          ./stage/bin/integration_test --ignored --nocapture

  pr-checks:
    runs-on: ubuntu-latest
    if: always()
    needs:
      - lints
      - tests
      - vm-compare-batches
      - host-run-batches
      - server-integration-build
      - server-integration-run
    steps:
      - name: Decide on PR checks
        uses: re-actors/alls-green@05ac9388f0aebcb5727afa17fcccfecd6f8ec5fe # v1.2.2
        with:
          jobs: ${{ toJSON(needs) }}
