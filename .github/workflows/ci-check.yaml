name: ci-run

on:
  pull_request:
  merge_group:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: check-${{ github.ref }}
  cancel-in-progress: true

env:
  CI_BATCHES: 506093.bin.gz,506155.bin.gz,506169.bin.gz

jobs:
  lints:
    name: lints
    runs-on: ubuntu-latest
    env:
      ZKSYNC_USE_CUDA_STUBS: true
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Install Rust toolchain
        uses: moonrepo/setup-rust@ede6de059f8046a5e236c94046823e2af11ca670 # v1.2.2
        with:
          inherit-toolchain: true

      - name: Install rustfmt and clippy
        run: rustup component add rustfmt clippy

      - name: Rustfmt
        run: cargo fmt --all --check

      # The Airbender guest is built via `cargo-airbender`, not plain Cargo targets.
      - name: Clippy
        run: cargo clippy --workspace --all-targets --exclude eravm-prover-guest --locked -- -D warnings

  tests:
    name: tests
    runs-on: matterlabs-ci-runner-high-performance
    env:
      ZKSYNC_USE_CUDA_STUBS: true
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      # Fetch the LFS batch fixtures the storage-soundness regressions
      # (crates/airbender_verifier/tests/fail_closed.rs) run against. A clean
      # checkout only has LFS pointers, and those tests fail closed under CI
      # rather than silently skip, so the `tests` job must materialize them.
      - name: Install linux packages
        shell: 'bash -ex {0}'
        env:
          DEBIAN_FRONTEND: noninteractive
        if: ${{ runner.os == 'Linux' }}
        run: |
          if command -v sudo >/dev/null 2>&1; then
            SUDO=sudo
          fi
          ${SUDO} apt update && ${SUDO} apt install -y git-lfs

      - name: Install Git LFS
        run: git lfs install --local

      - name: Pull CI mainnet batches
        run: ./scripts/fetch_lfs_batches.sh "$CI_BATCHES"

      - name: Install Rust toolchain
        uses: moonrepo/setup-rust@ede6de059f8046a5e236c94046823e2af11ca670 # v1.2.2
        with:
          inherit-toolchain: true

      # The Airbender guest is built via `cargo-airbender`, not plain Cargo targets.
      - name: Run tests
        run: cargo test --workspace --exclude eravm-prover-guest --locked

  vm-compare-batches:
    name: vm-compare-batches
    runs-on: matterlabs-ci-runner-high-performance
    env:
      ZKSYNC_USE_CUDA_STUBS: true
      BATCHES_DIR: testdata/era_mainnet_batches/binary
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Install linux packages
        shell: 'bash -ex {0}'
        env:
          DEBIAN_FRONTEND: noninteractive
        if: ${{ runner.os == 'Linux' }}
        run: |
          if command -v sudo >/dev/null 2>&1; then
            SUDO=sudo
          fi
          ${SUDO} apt update && ${SUDO} apt install -y git-lfs

      - name: Install Git LFS
        run: git lfs install --local

      - name: Pull CI mainnet batches
        run: ./scripts/fetch_lfs_batches.sh "$CI_BATCHES"

      - name: Install Rust toolchain
        uses: moonrepo/setup-rust@ede6de059f8046a5e236c94046823e2af11ca670 # v1.2.2
        with:
          inherit-toolchain: true

      - name: Compare CI batches
        run: |
          cargo run --release -p zksync_vm_compare --locked --bin vm_compare -- \
            --batches-dir "$BATCHES_DIR" \
            --batch-files "$CI_BATCHES"

  host-run-batches:
    name: host-run-batches
    runs-on: matterlabs-ci-runner-high-performance
    # Prebuilt cargo-airbender image (CPU) published by airbender-platform's
    # ci-release pipeline, pinned to the same v0.2.3 as the airbender-* crates
    # in Cargo.toml. Ships nightly Rust + cargo-binutils + cargo-airbender.
    container:
      image: ghcr.io/matter-labs/cargo-airbender:v0.2.3
    env:
      ZKSYNC_USE_CUDA_STUBS: true
      BATCHES_DIR: testdata/era_mainnet_batches/binary
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      # The container runs as root but the runner-mounted workspace is owned by
      # a different uid, so git refuses to touch it ("dubious ownership").
      - name: Mark workspace as safe for git
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Install linux packages
        env:
          DEBIAN_FRONTEND: noninteractive
        run: apt-get update && apt-get install -y libclang-dev git-lfs

      - name: Install Git LFS
        run: git lfs install --local

      - name: Pull CI mainnet batches
        run: ./scripts/fetch_lfs_batches.sh "$CI_BATCHES"

      # Uses the committed guest dist (guest/dist/app/app.bin); the guest is
      # never rebuilt outside the guest-check guard / update-vks.
      - name: Run host execution for CI batches
        run: |
          cargo run --release -p eravm-prover-host --locked -- \
            run \
            --batches-dir "$BATCHES_DIR" \
            --batch-files "$CI_BATCHES"

  # -----------------------------------------------------------------------------
  # Guard: guest/dist/app/app.bin is committed (the FRI VK embeds sha256(app.bin)),
  # so prod/CI/vast consume the committed binary without rebuilding. This job
  # rebuilds the guest inside the pinned cargo-airbender image — a fixed
  # toolchain + CARGO_HOME at a fixed CI workspace path yields reproducible
  # output — and diffs it against the committed app.bin (the same image +
  # invocation update-vks uses to produce it). A guest source change not paired
  # with a refreshed app.bin + vks fails CI.
  # -----------------------------------------------------------------------------
  guest-check:
    name: guest-check
    needs: change-filter
    if: needs.change-filter.outputs.guest == 'true'
    runs-on: matterlabs-ci-runner-high-performance
    timeout-minutes: 60
    container:
      image: ghcr.io/matter-labs/cargo-airbender:v0.2.3
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      # The container runs as root but the runner-mounted workspace is owned by
      # a different uid, so git refuses to touch it ("dubious ownership").
      - name: Mark workspace as safe for git
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Rebuild guest
        working-directory: ./guest
        run: cargo airbender build

      - name: Diff committed app.bin
        run: |
          # Only app.bin is committed/consumed; app.elf/app.text/manifest are
          # gitignored build byproducts, so this diff naturally ignores them.
          if ! git diff --exit-code --stat -- guest/dist/app/app.bin; then
            echo "::error::Committed guest/dist/app/app.bin does not match a fresh" \
                 "build in the pinned cargo-airbender image. Rebuild the guest," \
                 "run \`/update-vks\`, and commit guest/dist/app/app.bin + vks/."
            git diff --stat -- guest/dist/app/app.bin
            exit 1
          fi

  # -----------------------------------------------------------------------------
  # Build the host CLI with `--features gpu_snark` (plus era-bellman-cuda) on a
  # high-performance runner inside the cargo-airbender CUDA image. This is the
  # ONLY place where `gpu-prover` (and transitively `era_cudart_sys`,
  # `bellman-cuda`-using crates) compile — the GPU runner that runs `vk-check`
  # has the driver but no toolkit, so cargo there would either fail or hang.
  # Gated on `vk` changes so most PRs skip the expensive CUDA build.
  #
  # The guest dist is committed (guest/dist/app); no job rebuilds it here.
  # `vk-check` downloads these artifacts and runs them on the GPU runner.
  # -----------------------------------------------------------------------------
  vk-build:
    name: vk-build
    needs: change-filter
    if: needs.change-filter.outputs.vk == 'true'
    runs-on: matterlabs-ci-runner-high-performance
    timeout-minutes: 90
    # Prebuilt cargo-airbender CUDA image (v0.2.3) — ships nightly Rust +
    # clang + cmake + the CUDA 12.9 devel toolchain, so no per-step installs.
    container:
      image: ghcr.io/matter-labs/cargo-airbender-cuda:v0.2.3
    env:
      # The runtime runner is an RTX 6000 Ada (sm_89). Match prove-batch.yaml.
      CUDA_ARCH: "89"
      CUDAARCHS: "89"
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      # sccache (RUSTC_WRAPPER) wired to matterlabs's GCS bucket.
      # Same composite used by build-host in prove-batch.yaml.
      - name: Setup runner
        uses: matter-labs/zksync-os-server/.github/actions/runner-setup@24d38529dbeb2f0bdd016005b1e5e0bc491b692f

      - name: Install extra apt packages
        env:
          DEBIAN_FRONTEND: noninteractive
        run: apt-get update && apt-get install -y libclang-dev

      - name: Inspect toolchain
        run: |
          nvcc --version
          cmake --version
          rustc --version

      # Build era-bellman-cuda — `zksync-crypto-gpu`'s `gpu-ffi` build script
      # reads `BELLMAN_CUDA_DIR` from the env. Without it, linking gpu-prover
      # fails or stalls. (Same pattern as prove-batch.yaml's build-host.)
      - name: Build era-bellman-cuda
        run: |
          git clone --depth=1 https://github.com/matter-labs/era-bellman-cuda.git
          cmake -B era-bellman-cuda/build -S era-bellman-cuda -DCMAKE_BUILD_TYPE=Release
          cmake --build era-bellman-cuda/build -j"$(nproc)"
          echo "BELLMAN_CUDA_DIR=$(pwd)/era-bellman-cuda" >> "${GITHUB_ENV}"

      # Build the host CLI so vk-check can re-derive the FRI and SNARK VKs on
      # the GPU runner using `gen-vks`.
      - name: Build eravm-prover-host (gpu_snark)
        env:
          RUST_BACKTRACE: 1
        run: |
          cargo build --release -p eravm-prover-host --locked --features gpu_snark
          ls -lh target/release/eravm-prover-host

      # Compile (don't run) the host integration test so host-integration-run
      # can execute it on the GPU runner, which has no CUDA toolkit to build it.
      # cargo emits JSON metadata pointing at the hash-suffixed test executable.
      - name: Build host integration test binary
        env:
          RUST_BACKTRACE: 1
        run: |
          cargo test --release --locked --features gpu_snark \
            --package eravm-prover-host --test integration_test \
            --no-run --message-format=json > test-build.json
          test_bin=$(jq -r 'select(.executable != null and (.target.name == "integration_test")) | .executable' test-build.json | tail -n1)
          if [ -z "$test_bin" ]; then
            echo "Failed to locate integration_test binary in cargo metadata" >&2
            exit 1
          fi
          echo "Test binary: $test_bin"
          mkdir -p test-stage
          cp -v "$test_bin" test-stage/integration_test

      # Stage runtime CUDA libraries vk-check / host-integration-run need on the
      # GPU runner:
      #   - bellman-cuda's own outputs (it isn't in any system path)
      #   - libcudart from the container's CUDA toolkit (the GPU runner has the
      #     driver — `libcuda.so` — but no toolkit, so `libcudart.so.13` is
      #     missing without us shipping it)
      - name: Stage runtime CUDA libraries
        run: |
          mkdir -p bellman-cuda-stage
          find era-bellman-cuda/build -type f \( -name '*.so*' -o -name '*.a' \) -exec cp -v {} bellman-cuda-stage/ \;
          cp -v /usr/local/cuda/lib64/libcudart.so* bellman-cuda-stage/
          ls -lh bellman-cuda-stage/

      - name: Upload prover-host binary
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f3 # v6.0.0
        with:
          name: eravm-prover-host-bin
          path: target/release/eravm-prover-host
          if-no-files-found: error
          retention-days: 1

      - name: Upload host integration test binary
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f3 # v6.0.0
        with:
          name: eravm-prover-host-integration-test
          path: test-stage/integration_test
          if-no-files-found: error
          retention-days: 1

      - name: Upload bellman-cuda libraries
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f3 # v6.0.0
        with:
          name: bellman-cuda
          path: bellman-cuda-stage
          if-no-files-found: error
          retention-days: 1

      - name: sccache stats
        if: always()
        run: sccache --show-stats || true

  # -----------------------------------------------------------------------------
  # Cheap precondition for the expensive guest/VK guards: only run them when the
  # PR changes something that could affect the guest app.bin (`guest`) or either
  # verification key (`vk`). Most PRs touch neither, so we skip the guest rebuild
  # and the 30-minute GPU VK regen rather than burning runners.
  # -----------------------------------------------------------------------------
  change-filter:
    name: change-filter
    runs-on: ubuntu-latest
    outputs:
      # Inputs that can change the guest app.bin (and thus the FRI VK).
      guest: ${{ steps.filter.outputs.guest }}
      # Inputs that can change either VK (guest inputs + the host CLI that
      # derives them + the SNARK wrapper pin + direct edits to committed vks/).
      vk: ${{ steps.filter.outputs.vk }}
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - id: filter
        uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3.0.2
        with:
          filters: |
            # Anything the guest binary is built from. The guest links the
            # workspace `crates/*` (via zksync_airbender_verifier), so a crate
            # change can move app.bin too.
            guest: &guest
              - 'guest/**'
              - 'crates/**'
              # Cargo.lock / Cargo.toml pin the git deps compiled into the guest.
              - 'Cargo.lock'
              - 'Cargo.toml'
              # Toolchain bumps change codegen (and the pinned cargo-airbender
              # image tag lives in this workflow).
              - 'rust-toolchain.toml'
              - '.github/workflows/ci-check.yaml'
            vk:
              - *guest
              # Host CLI derives both VKs; wrapper/setup pins move the SNARK VK.
              - 'host/**'
              # Direct edits to committed VKs must always be revalidated.
              - 'vks/**'

  # -----------------------------------------------------------------------------
  # Re-derive the FRI and SNARK verification keys on the GPU runner and diff
  # them against the committed `vks/` directory. Fails if a PR changes the
  # guest binary (or the SNARK wrapper) without refreshing `vks/`. The server
  # only loads VKs from disk, so this guard is the only thing keeping prod
  # from running against a stale VK.
  # -----------------------------------------------------------------------------
  vk-check:
    name: vk-check
    needs: [vk-build, guest-check, change-filter]
    # vk-build shares the `vk` filter, so it runs whenever this job does.
    # guest-check only runs when the guest changed; tolerate its skip but never
    # its failure — a stale committed app.bin (which the FRI VK embeds) must
    # block VK regen. `!cancelled()` lets this evaluate despite a skipped
    # guest-check, which a plain `needs` would otherwise treat as non-success.
    if: >-
      !cancelled() &&
      needs.change-filter.outputs.vk == 'true' &&
      needs.vk-build.result == 'success' &&
      needs.guest-check.result != 'failure'
    runs-on: matterlabs-ci-hetzner-rtx6000-gpu
    timeout-minutes: 30
    # eravm-prover-host links against era-bellman-cuda and libcudart.so.13
    # via `--features gpu_snark`, so every step that runs the binary needs
    # the staged CUDA libs on the loader path.
    env:
      LD_LIBRARY_PATH: ${{ github.workspace }}/stage/cuda-libs
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Download prover-host binary
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          name: eravm-prover-host-bin
          path: stage/bin

      - name: Download bellman-cuda libraries
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          name: bellman-cuda
          path: stage/cuda-libs

      - name: Make host binary executable
        run: chmod +x stage/bin/eravm-prover-host

      - name: Download SNARK trusted setup
        run: |
          mkdir -p stage/setup
          ./stage/bin/eravm-prover-host download-trusted-setup \
              --output stage/setup/setup.key

      - name: Regenerate VKs from the committed guest dist
        env:
          # Derive VKs from the committed guest/dist/app (the FRI VK embeds
          # sha256(app.bin)); the baked-in CARGO_MANIFEST_DIR points elsewhere.
          ERAVM_PROVER_HOST_GUEST_DIR: ${{ github.workspace }}/guest/dist/app
          RUST_BACKTRACE: 1
          RUST_MIN_STACK: "134217728"
        run: |
          # SNARK wrapper recursion needs an unbounded stack — see README.md.
          ulimit -s unlimited
          ./stage/bin/eravm-prover-host gen-vks \
              --output-dir vks \
              --trusted-setup stage/setup/setup.key

      - name: Diff against committed VKs
        run: |
          if ! git diff --exit-code --stat -- vks/; then
            echo
            echo "::error::Committed verification keys in vks/ do not match" \
                 "the ones regenerated from the committed guest binary." \
                 "Run \`/update-vks\` to refresh guest/dist/app + vks/."
            git diff --stat -- vks/
            exit 1
          fi

  # -----------------------------------------------------------------------------
  # Run the prebuilt host integration test on the GPU runner. No cargo here —
  # only the prebuilt test binary from vk-build, the staged CUDA runtime libs,
  # and the LFS batch. The test drives the FRI→SNARK proving pipeline in-process
  # (no server), proving against the committed VKs. Gated on the same `vk`
  # filter as vk-build so it runs only when proving-relevant code changes.
  # -----------------------------------------------------------------------------
  host-integration-run:
    name: host-integration-run
    needs: [vk-build, change-filter]
    if: needs.change-filter.outputs.vk == 'true' && needs.vk-build.result == 'success'
    # RTX 6000 Ada (48GB VRAM) — required for the airbender prover. The
    # default `matterlabs-ci-gpu-runner` (L4, 22GB) OOMs during proving.
    runs-on: matterlabs-ci-hetzner-rtx6000-gpu
    timeout-minutes: 90
    steps:
      # Need the repo for scripts/fetch_lfs_batches.sh, the testdata path, and
      # the committed guest dist + VKs the test points its IT_* vars at.
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Install git-lfs
        shell: 'bash -ex {0}'
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          if command -v sudo >/dev/null 2>&1; then SUDO=sudo; fi
          ${SUDO} apt-get update
          ${SUDO} apt-get install -y git-lfs

      - name: Pull batch 506093
        run: |
          git lfs install --local
          ./scripts/fetch_lfs_batches.sh 506093.bin.gz

      - name: Download host integration test binary
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          name: eravm-prover-host-integration-test
          path: stage/bin

      - name: Download bellman-cuda libraries
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          name: bellman-cuda
          path: stage/cuda-libs

      - name: Make test binary executable
        run: |
          chmod +x stage/bin/integration_test
          ls -lh stage/bin stage/cuda-libs guest/dist/app

      - name: Run host integration test (FRI then SNARK)
        env:
          # The test binary's baked-in CARGO_MANIFEST_DIR points at the build
          # runner, so steer it at this runner's committed dist / VKs / corpus.
          IT_GUEST_DIST_DIR: ${{ github.workspace }}/guest/dist/app
          IT_BATCHES_DIR: ${{ github.workspace }}/testdata/era_mainnet_batches/binary
          IT_FRI_VK: ${{ github.workspace }}/vks/fri_vk.bin
          IT_SNARK_VK: ${{ github.workspace }}/vks/snark_vk.json
          IT_BATCH_FILE: 506093.bin.gz
          # libcudart and bellman-cuda's .so live in the staged dir.
          LD_LIBRARY_PATH: ${{ github.workspace }}/stage/cuda-libs
          RUST_BACKTRACE: 1
          # SNARK wrapping needs far more than the 2 MB default thread stack.
          RUST_MIN_STACK: "134217728"
        run: |
          # SNARK wrapper recursion needs a large stack — see README.md.
          ulimit -s unlimited
          ./stage/bin/integration_test --ignored --nocapture host_proves_fri_then_snark

  pr-checks:
    runs-on: ubuntu-latest
    if: always()
    needs:
      - lints
      - tests
      - vm-compare-batches
      - host-run-batches
      - change-filter
      - guest-check
      - vk-build
      - vk-check
      - host-integration-run
    steps:
      - name: Decide on PR checks
        uses: re-actors/alls-green@05ac9388f0aebcb5727afa17fcccfecd6f8ec5fe # v1.2.2
        with:
          # guest-check / vk-build / vk-check / host-integration-run legitimately
          # skip on PRs that don't change the guest binary or the VKs (see
          # change-filter).
          allowed-skips: guest-check,vk-build,vk-check,host-integration-run
          jobs: ${{ toJSON(needs) }}
