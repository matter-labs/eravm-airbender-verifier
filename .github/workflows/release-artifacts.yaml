name: release-artifacts

# Builds the guest binary and verification keys from the released source and
# attaches them to the GitHub Release as downloadable assets. These artifacts
# are NOT committed to the repo — they are produced here, from the exact tagged
# commit, so they can never drift from the source they were built against.
#
# Downstream consumers (e.g. matter-labs/zksync-era, the prover server) pull the
# versioned, immutable assets from the release rather than checking out this repo:
#   - app.bin / app.text  — the reproducibly-built guest dist
#   - fri_vk.bin          — FRI VK, embeds sha256(app.bin)
#   - snark_vk.json       — SNARK wrapper VK, derived from the trusted setup
#   - checksums.txt       — sha256 of every asset above
#
# Releases are created by ci-release-please.yaml when a release PR merges; the
# `release: published` trigger fires once the GitHub Release goes live and we
# build + upload the assets onto that tag. `workflow_dispatch` runs the same
# build on demand (e.g. to verify VK regeneration) without touching a release —
# the artifacts are left as downloadable workflow artifacts instead.

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-artifacts-${{ github.event.release.tag_name || github.ref }}
  cancel-in-progress: false

jobs:
  # Rebuild the guest inside the pinned cargo-airbender image. A fixed toolchain
  # + CARGO_HOME at a fixed workspace path yields a reproducible app.bin that
  # matches what ci-check's guest-build produces (same image + invocation).
  # app.elf/manifest are gitignored byproducts — only app.bin/app.text ship.
  build-guest:
    name: build-guest
    runs-on: matterlabs-ci-runner-high-performance
    timeout-minutes: 60
    container:
      image: ghcr.io/matter-labs/cargo-airbender:v0.2.3
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          ref: ${{ github.event.release.tag_name || github.ref }}
          persist-credentials: false

      - name: Build guest
        working-directory: ./guest
        run: cargo airbender build

      # Same instruction-set gate as ci-check's guest-build: the released
      # artifact must contain only provable RV32IM code (see the script header).
      # Scans the build ELF (the source of dist's app.bin/app.text objcopies) —
      # dist/app/app.elf has .text stripped (-R .text) and holds no code.
      - name: Check guest instruction set
        working-directory: ./guest
        run: |
          bash ../scripts/check_guest_riscv_code.sh \
            ../target/riscv32im-risc0-zkvm-elf/release/eravm-prover-guest \
            --baseline ../scripts/guest_softfloat_baseline.txt \
            --min-insns 500000

      - name: Upload guest dist
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f3 # v6.0.0
        with:
          name: release-guest-dist
          path: guest/dist/app
          if-no-files-found: error
          retention-days: 7

  # Build the host CLI with `--features gpu_snark` (plus era-bellman-cuda) on the
  # CUDA image. This is the only place gpu-prover / bellman-cuda compile; the GPU
  # runner that runs `regen` has the driver but no toolkit. The guest is built
  # separately (build-guest) so this GPU build never touches the
  # reproducibility-critical app.bin.
  build-host:
    name: build-host
    runs-on: matterlabs-ci-runner-high-performance
    timeout-minutes: 90
    container:
      image: ghcr.io/matter-labs/cargo-airbender-cuda:v0.2.3
    env:
      CUDA_ARCH: "89"
      CUDAARCHS: "89"
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          ref: ${{ github.event.release.tag_name || github.ref }}
          persist-credentials: false

      - name: Setup runner
        uses: matter-labs/zksync-os-server/.github/actions/runner-setup@24d38529dbeb2f0bdd016005b1e5e0bc491b692f

      - name: Install extra apt packages
        env:
          DEBIAN_FRONTEND: noninteractive
        run: apt-get update && apt-get install -y libclang-dev

      - name: Build era-bellman-cuda
        run: |
          git clone --depth=1 https://github.com/matter-labs/era-bellman-cuda.git
          cmake -B era-bellman-cuda/build -S era-bellman-cuda -DCMAKE_BUILD_TYPE=Release
          cmake --build era-bellman-cuda/build -j"$(nproc)"
          echo "BELLMAN_CUDA_DIR=$(pwd)/era-bellman-cuda" >> "${GITHUB_ENV}"

      - name: Build eravm-prover-host (gpu_snark)
        env:
          RUST_BACKTRACE: 1
        run: cargo build --release -p eravm-prover-host --locked --features gpu_snark

      - name: Stage runtime CUDA libraries
        run: |
          mkdir -p bellman-cuda-stage
          find era-bellman-cuda/build -type f \( -name '*.so*' -o -name '*.a' \) -exec cp -v {} bellman-cuda-stage/ \;
          cp -v /usr/local/cuda/lib64/libcudart.so* bellman-cuda-stage/

      - name: Upload prover-host binary
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f3 # v6.0.0
        with:
          name: release-prover-host-bin
          path: target/release/eravm-prover-host
          if-no-files-found: error
          retention-days: 1

      - name: Upload bellman-cuda libraries
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f3 # v6.0.0
        with:
          name: release-bellman-cuda
          path: bellman-cuda-stage
          if-no-files-found: error
          retention-days: 1

  # Regenerate the VKs on a GPU runner from the reproducibly-built guest dist
  # (the FRI VK embeds sha256(app.bin)) and the SNARK trusted setup.
  regen:
    name: regen
    needs: [build-guest, build-host]
    runs-on: matterlabs-ci-hetzner-rtx6000-gpu
    timeout-minutes: 60
    env:
      LD_LIBRARY_PATH: ${{ github.workspace }}/stage/cuda-libs
    steps:
      - name: Download prover-host binary
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          name: release-prover-host-bin
          path: stage/bin

      - name: Download guest dist
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          name: release-guest-dist
          path: stage/guest

      - name: Download bellman-cuda libraries
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          name: release-bellman-cuda
          path: stage/cuda-libs

      - name: Make host binary executable
        run: chmod +x stage/bin/eravm-prover-host

      - name: Download SNARK trusted setup
        run: |
          mkdir -p stage/setup
          ./stage/bin/eravm-prover-host download-trusted-setup \
              --output stage/setup/setup.key

      - name: Regenerate VKs
        env:
          # Derive VKs from the freshly-built guest dist (the FRI VK embeds
          # sha256(app.bin)); the baked-in CARGO_MANIFEST_DIR points elsewhere.
          ERAVM_PROVER_HOST_GUEST_DIR: ${{ github.workspace }}/stage/guest
          RUST_BACKTRACE: 1
          RUST_MIN_STACK: "134217728"
        run: |
          # SNARK wrapper recursion needs an unbounded stack — see README.md.
          ulimit -s unlimited
          mkdir -p vks-output
          ./stage/bin/eravm-prover-host gen-vks \
              --output-dir vks-output \
              --trusted-setup stage/setup/setup.key
          ls -lh vks-output

      - name: Upload regenerated VKs
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f3 # v6.0.0
        with:
          name: release-vks
          path: vks-output
          if-no-files-found: error
          retention-days: 7

  # Assemble the four assets + checksums and, on a published release, attach them
  # to the release tag. On workflow_dispatch there is no release to upload to, so
  # the assembled bundle is left as a downloadable workflow artifact instead.
  publish:
    name: publish
    needs: [build-guest, regen]
    runs-on: ubuntu-latest
    steps:
      - name: Download guest dist
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          name: release-guest-dist
          path: release-artifacts

      - name: Download VKs
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          name: release-vks
          path: release-artifacts

      - name: Verify artifacts and build checksums
        working-directory: release-artifacts
        run: |
          set -euo pipefail
          for f in app.bin app.text fri_vk.bin snark_vk.json; do
            test -f "$f" || { echo "::error::missing release artifact: $f"; exit 1; }
          done
          sha256sum app.bin app.text fri_vk.bin snark_vk.json > checksums.txt
          ls -lh
          cat checksums.txt

      - name: Upload assembled bundle as a workflow artifact
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f3 # v6.0.0
        with:
          name: release-bundle
          path: release-artifacts
          if-no-files-found: error
          retention-days: 7

      # --clobber makes re-runs idempotent (e.g. re-publishing a release).
      - name: Upload artifacts to release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            --repo "${{ github.repository }}" \
            release-artifacts/app.bin \
            release-artifacts/app.text \
            release-artifacts/fri_vk.bin \
            release-artifacts/snark_vk.json \
            release-artifacts/checksums.txt \
            --clobber
