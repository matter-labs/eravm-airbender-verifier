[advisories]
unmaintained = "none" # This usually create a lot of non-actionable noise.
ignore = []

[bans]
multiple-versions = "warn"
deny = []
skip = []
skip-tree = []

workspace-default-features = "allow"
external-default-features = "allow"

[sources]
unknown-registry = "warn"
unknown-git = "warn"

allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = [
    "https://github.com/matter-labs/airbender-platform",
    "https://github.com/matter-labs/vm2",
    "https://github.com/matter-labs/zkos-wrapper/",
    "https://github.com/matter-labs/zksync-airbender",
    "https://github.com/matter-labs/zksync-crypto",
    "https://github.com/matter-labs/zksync-protocol",
]

[licenses]
# Keep inference strict so license checks fail only when the dependency metadata
# or bundled license text is clear enough to trust.
confidence-threshold = 0.93
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "MIT",
    "MPL-2.0",
    "CDDL-1.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "CC0-1.0",
    "Zlib",
    "CDLA-Permissive-2.0",
]
exceptions = []
