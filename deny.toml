[advisories]
unmaintained = "none" # This usually create a lot of non-actionable noise.
ignore = [
    # DoS advisories in quick-xml < 0.41 (RUSTSEC-2026-0194: quadratic time on
    # duplicate start-tag attribute names; RUSTSEC-2026-0195: unbounded
    # namespace-declaration allocation in `NsReader`). Pulled only transitively
    # via `riscv_transpiler` -> `inferno` (flamegraph/profiling tooling in the
    # Airbender build toolchain) — not on the verifier's runtime or any
    # attacker-facing path, and never fed untrusted XML. No fix is reachable yet:
    # the latest `inferno` (0.12.6) still pins `quick-xml` below 0.40, so the
    # patched `>= 0.41` cannot be selected. Revisit once `inferno` upgrades.
    "RUSTSEC-2026-0194",
    "RUSTSEC-2026-0195",
]

[bans]
multiple-versions = "warn"
deny = []
skip = []
skip-tree = []

workspace-default-features = "allow"
external-default-features = "allow"

[sources]
unknown-registry = "warn"
unknown-git = "warn"

allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = [
    "https://github.com/matter-labs/airbender-platform",
    "https://github.com/matter-labs/vm2",
    "https://github.com/matter-labs/zkos-wrapper/",
    "https://github.com/matter-labs/zksync-airbender",
    "https://github.com/matter-labs/zksync-crypto",
    "https://github.com/matter-labs/zksync-protocol",
]

[licenses]
# Keep inference strict so license checks fail only when the dependency metadata
# or bundled license text is clear enough to trust.
confidence-threshold = 0.93
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "MIT",
    "MPL-2.0",
    "CDDL-1.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "CC0-1.0",
    "Zlib",
    "CDLA-Permissive-2.0",
]
exceptions = []
